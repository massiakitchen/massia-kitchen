<section id="faq" class="section faq reveal">
  <div class="container">
    <h3 class="gold-title">أسئلة شائعة</h3>
    <div class="faq-grid">
      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          كم مدة تنفيذ المطبخ؟
          <span class="faq-icon">+</span>
        </button>
        <div class="faq-answer">
          <p>مدة التنفيذ تتراوح بين 2-4 أسابيع حسب التصميم والمساحة والتعقيد. نحرص على التسليم في الوقت المتفق عليه مع الحفاظ على أعلى معايير الجودة.</p>
        </div>
      </div>
      
      <div class="faq-item">
        <button class="faq-question" aria-expanded="false">
          هل تقدمون خدمة التصميم المجاني؟
          <span class="faq-icon">+</span>
        </button>
        <div class="faq-answer">
          <p>نعم، نقدم استشارة وتصميم أولي مجاني. يمكنك زيارة أحد فروعنا أو طلب زيارة منزلية مجانية حيث يقوم مصممنا بقياس المساحة وتقديم التصميم المناسب.</p>
        </div>
      </div>
    </div>
  </div>
</section>
